<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TP - Connexion & inscription en SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: rgb(47, 51, 56);
            --bg-soft: rgb(58, 63, 69);
            --text: rgb(253, 247, 212);
            --text-p: rgba(253, 247, 212, 0.65);
            --accent: rgb(166, 58, 58);
            --accent-hover: rgb(243, 73, 73);
            --border: rgba(253, 247, 212, 0.12);
            --danger: rgb(255, 120, 120);
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Geist', sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        header {
            position: sticky;
            top: 0;
            background-color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            z-index: 10;
        }

        nav {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-evenly;
            gap: 12px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 0.25rem;
            transition: background-color 0.15s ease;
        }

        nav a:hover {
            background-color: rgba(0, 0, 0, 0.15);
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 64px 24px;
            text-align: center;
        }

        h1 { font-size: 3rem; margin: 0 0 12px; letter-spacing: -0.02em; }
        h2 { font-size: 1.5rem; margin: 0 0 24px; letter-spacing: -0.01em; }
        p  { color: var(--text-p); margin: 0 0 16px; }

        form {
            background-color: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            padding: 32px;
            text-align: left;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        form label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-p);
        }

        form input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        form input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(228, 102, 52, 0.25);
        }

        form button {
            width: 100%;
            padding: 11px 16px;
            background-color: var(--accent);
            color: var(--text);
            border: none;
            border-radius: 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.05s ease;
        }

        form button:hover { background-color: var(--accent-hover); }
        form button:active { transform: translateY(1px); }

        #message {
            margin: 12px 0 0;
            font-size: 0.875rem;
            color: var(--danger);
            min-height: 1.2em;
        }

        footer {
            background-color: var(--bg-soft);
            padding: 16px 24px;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text);
        }

        br { display: none; }
    </style>
</head>
<body>
    <header>
        <nav id="nav">
            <a href="#" onclick="home(); return false;">Home</a>
            <a href="#" onclick="connexion(); return false;" id="lien-connexion">Connexion</a>
            <a href="#" onclick="inscription(); return false;" id="lien-inscription">Inscription</a>
            <a href="#" onclick="deconnexion(); return false;" id="lien-deconnexion" style="display:none;">Déconnexion</a>
        </nav>
    </header>

    <main id="app"></main>
    
    <script src="api.js"></script>
    <script src="connexion.js"></script>

    <footer>
        &copy; 2026 TP - Connexion & inscription en SPA
    </footer>

</body>
</html>
